<!-- Marked.js for Markdown parsing -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- Highlight.js for Code Highlighting -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get('q');

    if (!query) {
        document.getElementById('loading-box').innerHTML = '<p class="text-danger">No query provided.</p>';
        return;
    }

    document.getElementById('query-term').innerText = `"${query}"`;

    fetch('/api/ai-search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('loading-box').classList.add('d-none');
        const box = document.getElementById('ai-answer-box');
        box.classList.remove('d-none');
        
        if (data.error) {
            box.innerText = 'Error loading results: ' + data.error;
            return;
        }

        // Render Markdown & Code Highlight
        box.innerHTML = marked.parse(data.answer);
        box.querySelectorAll('pre code').forEach((el) => {
            hljs.highlightElement(el);
        });
    })
    .catch(err => {
        document.getElementById('loading-box').classList.add('d-none');
        document.getElementById('ai-answer-box').classList.remove('d-none');
        document.getElementById('ai-answer-box').innerText = 'Connection or server error.';
    });
});
</script>
