    <!-- Custom JS -->
    <script src="../js/main.js"></script>
    
<script>
let currentFolder = '';
let allBookmarks = [];

document.addEventListener('DOMContentLoaded', () => {
    loadBookmarks();

    // Hook search event
    document.getElementById('bookmark-search-input').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        renderBookmarks(allBookmarks.filter(item => {
            return item.title.toLowerCase().includes(query) || 
                   (item.details.question && item.details.question.toLowerCase().includes(query));
        }));
    });
});

function loadBookmarks() {
    const container = document.getElementById('bookmarks-container');
    container.innerHTML = '<div class="col-12 text-center py-5 text-secondary">Loading your bookmarks...</div>';

    const url = currentFolder ? `/api/bookmarks?folder=${encodeURIComponent(currentFolder)}` : '/api/bookmarks';

    fetch(url)
        .then(res => res.json())
        .then(data => {
            allBookmarks = data;
            renderBookmarks(data);
        });
}

function renderBookmarks(data) {
    const container = document.getElementById('bookmarks-container');
    container.innerHTML = '';
    
    if (data.length === 0) {
        container.innerHTML = '<div class="col-12 text-center py-5 text-secondary"><i class="fa-solid fa-bookmark fa-3x mb-3 text-muted"></i><p>No matching bookmarked questions.</p></div>';
        return;
    }

    data.forEach(item => {
        const col = document.createElement('div');
        col.className = 'col-md-6 mb-4';
        col.innerHTML = `
            <div class="card card-glass h-100 p-4">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <h4 class="text-primary m-0">${item.title}</h4>
                    <button class="btn btn-outline-danger btn-sm" onclick="removeBookmark(${item.id})">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
                <div class="mb-3">
                    <span class="badge bg-primary">${item.difficulty}</span>
                    <span class="badge bg-secondary">${item.type.toUpperCase()}</span>
                    <span class="badge bg-info">${item.folder}</span>
                </div>
                <p class="text-secondary" style="white-space: pre-wrap; font-size: 0.95rem;">${item.details.question || 'No question details available.'}</p>
                <div class="mt-auto pt-3 border-top d-flex justify-content-between align-items-center">
                    <small class="text-muted">Saved: ${item.bookmarked_at}</small>
                    <a href="/api/export-pdf/${item.id}" class="btn btn-sm btn-gradient rounded-pill">
                        <i class="fa-solid fa-file-pdf me-1"></i>PDF
                    </a>
                </div>
            </div>
        `;
        container.appendChild(col);
    });
}

function filterFolder(btn, folder) {
    // Update active state in UI
    document.querySelectorAll('#folder-list button').forEach(b => {
        b.classList.remove('active');
        b.classList.remove('text-primary');
        b.classList.add('text-secondary');
    });
    btn.classList.add('active');
    btn.classList.remove('text-secondary');
    btn.classList.add('text-primary');

    currentFolder = folder;
    loadBookmarks();
}

function removeBookmark(id) {
    if(!confirm('Are you sure you want to remove this bookmark?')) return;
    
    fetch('/api/bookmarks', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question_id: id })
    })
    .then(res => res.json())
    .then(data => {
        loadBookmarks();
    });
}
</script>
